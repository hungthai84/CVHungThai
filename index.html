      flex-direction: column;
    }
    .sidebar-widget-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: var(--color-brand-glass-border);
    }
    .related-posts-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    .related-post-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
        border-radius: 15px;
    }
    .related-post-item:hover {
        background-color: var(--color-brand-active-menu-bg);
        transform: scale(1.02);
    }
    .related-post-item:hover .related-post-title {
      color: var(--accent-color);
    }
    .related-post-image {
        width: 60px;
        height: 50px;
        object-fit: cover;
        border-radius: 15px;
        flex-shrink: 0;
        border: var(--color-brand-glass-border);
    }
    .related-post-info {
        overflow: hidden;
    }
    .related-post-title {
        font-size: 0.9rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.2s;
    }
    .related-post-group {
        font-size: 0.75rem;
        color: var(--color-brand-text-secondary);
    }
    .audio-player-widget {
        display: flex;
        align-items: center;
        gap: 1rem;
        background-color: var(--color-brand-progress-bg);
        padding: 0.5rem;
        border-radius: 15px;
    }
    .audio-player-button {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        border: none;
        background-color: var(--accent-color);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        flex-shrink: 0;
    }
    .audio-player-button:hover {
        filter: brightness(1.1);
    }
    .audio-player-button.speaking {
        animation: pulse 1.5s infinite;
    }
    .audio-player-info {
        display: flex;
        flex-direction: column;
    }
    .project-post-page-card .audio-player-title {
        color: #FFFFFF;
        text-shadow: 0 0 2px #fff, 0 0 5px #fff, 0 0 10px #ff2d95, 0 0 20px #ff2d95, 0 0 30px #ff2d95, 0 0 40px #ff2d95;
        font-weight: 600;
    }
    .audio-player-status {
        font-size: 0.85rem;
        color: var(--color-brand-text-secondary);
    }
    
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(var(--accent-color-rgb), 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(var(--accent-color-rgb), 0); }
        100% { box-shadow: 0 0 0 0 rgba(var(--accent-color-rgb), 0); }
    }
    @keyframes idle-glow-animation {
      0%, 100% {
        box-shadow: 0 0 5px rgba(var(--accent-color-rgb), 0.3), 0 0 0 0 rgba(var(--accent-color-rgb), 0.3);
      }
      50% {
        box-shadow: 0 0 12px rgba(var(--accent-color-rgb), 0.6), 0 0 0 5px rgba(var(--accent-color-rgb), 0);
      }
    }
    .audio-player-button.idle-glow {
      animation: idle-glow-animation 2.5s infinite ease-in-out;
    }
    
    .project-post-body p {
        font-size: 1rem;
        line-height: 1.8;
    }
    .project-post-body ul {
        list-style: disc;
        padding-left: 1.5rem;
    }
    .project-post-body li {
        margin-bottom: 0.75rem;
    }
    .project-post-body .case-study-section {
        margin-bottom: 2rem;
    }
    .project-post-body .case-study-section h3 {
        font-size: 1.4rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--accent-color);
        display: inline-block;
        margin-bottom: 1rem;
    }
    .project-post-body .case-study-image {
        width: 100%;
        border-radius: 15px;
        margin: 1.5rem 0;
        box-shadow: var(--card-box-shadow);
        border: var(--color-brand-glass-border);
    }
    .project-post-body .case-study-results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.5rem;
        background-color: var(--color-brand-progress-bg);
        padding: 2rem;
        border-radius: 15px;
        border: var(--color-brand-glass-border);
    }
    .project-post-body .result-item {
        text-align: center;
    }
    .project-post-body .result-metric {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--accent-color);
        line-height: 1.1;
    }
    .project-post-body .result-label {
        font-size: 0.9rem;
        color: var(--color-brand-text-secondary);
    }
    .case-study-video-container {
        margin: 1.5rem 0;
        aspect-ratio: 16 / 9;
        width: 100%;
        border-radius: 15px;
        overflow: hidden;
        border: var(--color-brand-glass-border);
        box-shadow: var(--card-box-shadow);
    }
    .case-study-video-container iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    
    /* --- New custom comments section styles --- */
    .comment-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 2rem;
    }
    .comment-form-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
    }
    .comment-form input,
    .comment-form textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 15px;
        border: var(--color-brand-glass-border);
        background-color: var(--sidebar-bg);
        color: var(--color-brand-text-primary);
        font-size: 1rem;
        font-family: inherit;
        transition: box-shadow 0.2s;
        box-sizing: border-box;
    }
    .comment-form input:focus,
    .comment-form textarea:focus {
        outline: none;
        box-shadow: 0 0 0 2px var(--accent-color);
    }
    .comment-form textarea {
        min-height: 120px;
        resize: vertical;
    }
    .comment-form .btn {
        align-self: flex-start;
    }
    .comments-list {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }
    .comment-item {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
    }
    .comment-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: var(--color-brand-progress-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        font-weight: 600;
        color: var(--accent-color);
    }
    .comment-content {
        flex-grow: 1;
        background: var(--color-brand-progress-bg);
        border: var(--color-brand-glass-border);
        padding: 1rem;
        border-radius: 15px;
    }
    .comment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
    }
    .comment-author {
        font-weight: 600;
        color: var(--color-brand-text-primary);
    }
    .comment-date {
        font-size: 0.8rem;
        color: var(--color-brand-text-secondary);
    }
    .comment-text {
        margin: 0;
    }

    /* --- Mind Map Generation States --- */
    .mind-map-loader, .mind-map-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
        min-height: 200px;
        background-color: var(--color-brand-progress-bg);
        border-radius: 10px;
        border: var(--color-brand-glass-border);
    }
    .mind-map-loader p, .mind-map-error p {
      margin: 0;
      font-weight: 500;
    }
    .mind-map-loader svg {
        width: 2.5rem;
        height: 2.5rem;
        margin-bottom: 1rem;
        color: var(--accent-color);
    }
    .mind-map-error {
        color: #ef4444; /* red-500 */
    }
    .mind-map-error svg {
        width: 2.5rem;
        height: 2.5rem;
        margin-bottom: 1rem;
    }
    .mind-map-error img {
        margin-top: 1rem;
        max-width: 100%;
        border-radius: 10px;
        opacity: 0.5;
        border: var(--color-brand-glass-border);
    }


    /* --- Lightbox Styles --- */
    .lightbox-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        box-sizing: border-box;
        animation: fadeIn 0.3s forwards;
    }
    .lightbox-content {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .lightbox-image-container {
        max-width: 90vw;
        max-height: 90vh;
    }
    .lightbox-image-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: scaleIn 0.3s forwards;
    }
    .lightbox-close-btn, .lightbox-nav-btn {
        position: absolute;
        z-index: 2001;
        border: none;
        background-color: rgba(30, 30, 30, 0.7);
        color: white;
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s;
    }
    .lightbox-close-btn:hover, .lightbox-nav-btn:hover {
        background-color: rgba(0, 0, 0, 0.9);
    }
    .lightbox-close-btn {
        top: 1rem;
        right: 1rem;
    }
    .lightbox-nav-btn.prev {
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
    }
    .lightbox-nav-btn.next {
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
    }

    /* --- Video/Embed Popup --- */
    .video-popup-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        box-sizing: border-box;
        animation: fadeIn 0.3s forwards;
    }
    .video-popup-content {
        position: relative;
        width: 80vw;
        max-width: 1200px;
        max-height: 90vh;
        aspect-ratio: 16 / 9;
        background: #111;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: scaleIn 0.3s forwards;
    }
    .video-popup-content video,
    .video-popup-content iframe {
        width: 100%;
        height: 100%;
        display: block;
        border: none;
    }
    .video-popup-close-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        z-index: 2001;
        border: none;
        background-color: rgba(30, 30, 30, 0.7);
        color: white;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s, transform 0.2s;
    }
    .video-popup-close-btn:hover {
        background-color: rgba(0, 0, 0, 0.9);
        transform: scale(1.1);
    }

    /* --- Permission Notice --- */
    .permission-notice-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        box-sizing: border-box;
        animation: fadeIn 0.3s forwards;
    }
    .permission-notice-card {
        width: 100%;
        max-width: 450px;
        background-color: var(--sidebar-bg);
        border: var(--color-brand-glass-border);
        box-shadow: var(--card-box-shadow);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        overflow: hidden;
        position: relative;
        padding: 2.5rem 2rem 2rem;
        animation: scaleIn 0.3s forwards;
    }
    .permission-notice-icon {
        width: auto;
        height: 4rem;
        padding: 0 2rem;
        border-radius: 15px;
        background-color: rgba(var(--accent-color-rgb), 0.1);
        color: var(--accent-color);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
        gap: 1.5rem;
    }
    .permission-notice-icon svg {
        width: 2.5rem;
        height: 2.5rem;
    }
    .permission-notice-card h4 {
        margin: 0 0 0.75rem 0;
        font-size: 1.375rem;
        color: var(--color-brand-text-primary);
    }
    .permission-notice-card p {
        margin: 0 0 2rem 0;
        color: var(--color-brand-text-secondary);
        line-height: 1.6;
    }

    /* --- Scroll Animations --- */
    .fade-in-up-on-scroll {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .fade-in-up-on-scroll.is-visible {
        opacity: 1;
        transform: translateY(0);
    }
    
    /* --- Language Switcher (Dropdown) --- */
    .language-switcher-dropdown {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 50;
    }
    .language-switcher-button {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: var(--color-brand-glass-border);
      background: var(--sidebar-bg);
      border-radius: 999px;
      color: var(--color-brand-text-primary);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--card-box-shadow);
    }
    .language-switcher-button:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
      background-color: var(--color-brand-active-menu-bg);
      transform: translateY(-2px);
    }
    .language-switcher-button .chevron-icon {
      transition: transform 0.2s ease-in-out;
    }
    .language-switcher-button .chevron-icon.open {
      transform: rotate(180deg);
    }
    .language-dropdown-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 160px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(10px);
      border: var(--color-brand-glass-border);
      border-radius: 15px;
      padding: 0.5rem;
      box-shadow: var(--card-box-shadow);
      animation: fadeIn 0.2s ease-out;
      z-index: 51;
    }
    .dropdown-item {
      width: 100%;
      padding: 0.6rem 1rem;
      border: none;
      background: transparent;
      border-radius: 0.5rem;
      text-align: left;
      color: var(--color-brand-text-primary);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    .dropdown-item:hover {
      background-color: var(--color-brand-active-menu-bg);
      color: var(--accent-color);
    }
    .dropdown-item.active {
      background-color: var(--color-brand-active-menu-bg);
      color: var(--accent-color);
      font-weight: 600;
    }

    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }
    
    /* --- Clock & Weather Widget --- */
    .clock-weather-widget {
      width: 100%;
      padding: 0.5rem;
      box-sizing: border-box;
      border-radius: 15px;
      background-color: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: var(--color-brand-text-primary);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      gap: 0;
    }
    html.dark .clock-weather-widget {
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }
    .time-display {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.5px;
    }
    .date-display {
      display: flex;
      flex-direction: column;
      font-size: 0.7rem;
      line-height: 1.2;
      font-weight: 500;
      color: var(--color-brand-text-secondary);
    }
    .temperature-display {
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .temperature-display .degree-symbol {
      font-size: 0.75rem;
      line-height: 1.5;
    }
    .temperature-display .degree-celsius {
      font-size: 0.75rem;
      line-height: 1.5;
      font-weight: 400;
      color: var(--color-brand-text-secondary);
    }
    .location-display {
      display: flex;
      flex-direction: column;
      margin-top: 0.1rem;
    }
    .location-display .city {
      font-size: 0.8rem;
      font-weight: 500;
    }
    .location-display .country {
      font-size: 0.65rem;
      color: var(--color-brand-text-secondary);
    }
    .weather-icon-wrapper {
      margin: 0.25rem 0;
      width: 40px;
      height: 40px;
      position: relative;
    }
    .weather-sun {
      width: 20px;
      height: 20px;
      background-color: #fcc419;
      border-radius: 50%;
      position: absolute;
      bottom: 2px;
      right: 3px;
      box-shadow: 0 0 8px #fcc419;
      z-index: 1;
    }
    .weather-cloud-large {
      position: absolute;
      width: 23px;
      height: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      top: 15px;
      left: 0px;
      z-index: 2;
      box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
    }
    .weather-cloud-small {
      position: absolute;
      width: 14px;
      height: 14px;
      background: #f8f9fa;
      border-radius: 50%;
      top: 7px;
      left: 10px;
      z-index: 3;
    }

    /* --- Achievements Page --- */
    .achievement-category-grid {
        column-count: 2;
        column-gap: 1.5rem;
        flex: 1;
        overflow-y: auto;
        padding: 0 0.5rem 0.5rem 0.5rem;
    }
    .achievement-card {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        background-color: var(--sidebar-bg);
        padding: 1.5rem;
        border-radius: 15px;
        border: var(--color-brand-glass-border);
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        break-inside: avoid;
        margin-bottom: 1.5rem;
    }
    .achievement-card:hover {
        transform: translateY(-4px);
        border-color: var(--item-color);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        cursor: pointer;
    }
    html.dark .achievement-card:hover {
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    .achievement-card-rate {
        font-size: 2.5rem;
        font-weight: 700;
        line-height: 1;
        color: var(--item-color);
        flex-shrink: 0;
        width: auto;
        text-align: right;
        display: flex;
        align-items: baseline;
        justify-content: flex-end;
    }
    .achievement-card-percent-sign {
        font-size: 1.25rem;
        font-weight: 500;
        color: var(--item-color);
        margin-left: 2px;
    }

    .achievement-card-main-content {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex-grow: 1;
        min-width: 0; /* Prevents overflow */
    }

    .achievement-card-title-group {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--ach-card-text-primary);
    }
    .achievement-card-title-group svg {
        width: 1.25rem;
        height: 1.25rem;
        flex-shrink: 0;
        color: var(--item-color);
    }
    .achievement-card-title-group h4 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--item-color);
    }

    .achievement-card-description {
        color: var(--ach-card-text-secondary);
        font-size: 0.875rem;
    }
    .achievement-card-description p {
        margin: 0;
        line-height: 1.5;
    }
    .achievement-card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
    .achievement-card-tags button {
        background-color: var(--ach-tag-bg);
        color: var(--ach-tag-text);
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 500;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .achievement-card-tags button:hover {
        background-color: var(--color-brand-active-menu-bg);
        color: var(--accent-color);
        border-color: var(--accent-color);
    }


    /* Responsive overrides */
    @media (max-width: 1300px) {
        .projects-grid.view-grid {
            grid-template-columns: repeat(3, 1fr);
        }
        .projects-grid.view-masonry {
            column-count: 2;
        }
    }
    @media (max-width: 991px) {
      .projects-grid.view-grid {
          grid-template-columns: repeat(2, 1fr);
      }
      .settings-grid {
        grid-template-columns: 1fr;
      }
      .projects-grid.view-list .project-card-new {
        flex-direction: column; /* Revert to vertical card */
      }
      .projects-grid.view-list .project-card-new-image {
        width: 100%;
        aspect-ratio: 16 / 10; /* Restore aspect ratio */
      }
      .about-page-grid {
        grid-template-columns: 1fr;
        height: auto;
      }
      .about-video-card {
        order: -1; /* Move video to top on mobile */
      }
      .bio-video-wrapper {
        min-height: 300px;
        aspect-ratio: 16 / 9;
        height: auto;

    /* --- Shiny Glass Hover Effect --- */
    .header-icon-button::before,
    .social-icon-link::before {
      content: '';
      position: absolute;
      top: -150%;
      left: -150%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        45deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      transform: rotate(45deg);
      transition: all 0.5s ease;
      pointer-events: none;
